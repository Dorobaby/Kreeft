<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio No Disponible</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f5;
            color: #2d3748;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-top: 6px solid #2f855a;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            color: #2d3748;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #718096;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .event-card {
            background-color: #f0fff4;
            border: 1px solid #c6f6d5;
            padding: 20px;
            border-radius: 8px;
        }

        .event-card h2 {
            font-size: 1.1rem;
            color: #22543d;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .event-card .date {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2f855a;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">📍</div>
        <h1>Aplicación No Disponible</h1>
        <p>Le informamos que este mapa y el registro de puntos de venta ya no se encuentran activos.</p>
        
        <div class="event-card">
            <h2>Próximo Evento</h2>
            <div class="date">Fiestas de San Juan</div>
            <p style="margin: 5px 0 0 0; font-size: 0.95rem; color: #276749;">Del 22 de Junio al 25 de Junio</p>
        </div>
    </div>

</body>
</html>
